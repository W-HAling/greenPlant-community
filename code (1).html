<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漂流瓶 · 星空海滩</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; }
        .title-overlay {
            position: fixed;
            top: 28px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: clamp(20px, 3vw, 30px);
            color: rgba(255, 255, 240, 0.5);
            text-shadow: 0 0 20px rgba(80, 130, 220, 0.4), 0 0 40px rgba(60, 100, 180, 0.15);
            pointer-events: none;
            letter-spacing: 12px;
            z-index: 10;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="title-overlay">漂流瓶</div>
    <canvas id="c"></canvas>

    <script>
    (function () {
        /* ====== 基础设置 ====== */
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let W, H, horizonY, sandY;

        function fillRoundRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.arcTo(x + w, y, x + w, y + r, r);
            ctx.lineTo(x + w, y + h - r);
            ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
            ctx.lineTo(x + r, y + h);
            ctx.arcTo(x, y + h, x, y + h - r, r);
            ctx.lineTo(x, y + r);
            ctx.arcTo(x, y, x + r, y, r);
            ctx.closePath();
            ctx.fill();
        }

        /* ====== 星星 ====== */
        let stars = [];
        function initStars() {
            stars = [];
            const count = Math.min(600, Math.floor(W * H / 1800));
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * W,
                    y: Math.random() * horizonY * 1.05,
                    r: Math.random() * 1.6 + 0.3,
                    speed: Math.random() * 2 + 0.5,
                    phase: Math.random() * Math.PI * 2,
                    base: Math.random() * 0.45 + 0.3
                });
            }
        }

        function drawStars(t) {
            for (const s of stars) {
                const a = s.base * (0.45 + 0.55 * Math.sin(t * s.speed + s.phase));
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,245,' + a.toFixed(3) + ')';
                ctx.fill();
            }
        }

        /* ====== 银河 ====== */
        let milkyStars = [];
        function initMilkyWay() {
            milkyStars = [];
            for (let i = 0; i < 900; i++) {
                const p = Math.random();
                const cx = W * (0.05 + p * 0.9);
                const cy = H * (0.04 + p * 0.32);
                const angle = Math.atan2(H * 0.32, W * 0.9);
                const spread = (Math.random() - 0.5) * H * 0.07;
                milkyStars.push({
                    x: cx + (-Math.sin(angle)) * spread,
                    y: cy + Math.cos(angle) * spread,
                    r: Math.random() * 1.1 + 0.15,
                    a: Math.random() * 0.35 + 0.08
                });
            }
        }

        function drawMilkyWay(t) {
            for (const s of milkyStars) {
                const f = 0.65 + 0.35 * Math.sin(t * 1.3 + s.x * 0.008 + s.y * 0.005);
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(195,205,255,' + (s.a * f).toFixed(3) + ')';
                ctx.fill();
            }
        }

        /* ====== 流星 ====== */
        let meteors = [];
        function updateMeteors(t) {
            if (Math.random() < 0.0025 && meteors.length < 2) {
                meteors.push({
                    x: Math.random() * W * 0.7 + W * 0.1,
                    y: Math.random() * H * 0.25,
                    vx: 3.5 + Math.random() * 4,
                    vy: 1.5 + Math.random() * 2.5,
                    life: 1,
                    decay: 0.012 + Math.random() * 0.01,
                    len: 50 + Math.random() * 40
                });
            }
            for (let i = meteors.length - 1; i >= 0; i--) {
                const m = meteors[i];
                m.x += m.vx;
                m.y += m.vy;
                m.life -= m.decay;
                if (m.life <= 0) { meteors.splice(i, 1); continue; }
                const ex = m.x - m.vx / 5 * m.len;
                const ey = m.y - m.vy / 5 * m.len;
                const g = ctx.createLinearGradient(m.x, m.y, ex, ey);
                g.addColorStop(0, 'rgba(255,255,240,' + m.life.toFixed(3) + ')');
                g.addColorStop(1, 'rgba(255,255,240,0)');
                ctx.beginPath();
                ctx.moveTo(m.x, m.y);
                ctx.lineTo(ex, ey);
                ctx.strokeStyle = g;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }

        /* ====== 海面星光倒影 ====== */
        let reflections = [];
        function initReflections() {
            reflections = [];
            for (let i = 0; i < 70; i++) {
                reflections.push({
                    x: Math.random() * W,
                    y: horizonY + Math.random() * (sandY - horizonY),
                    w: Math.random() * 18 + 5,
                    h: Math.random() * 1.8 + 0.8,
                    a: Math.random() * 0.25 + 0.08,
                    spd: Math.random() * 1.2 + 0.4,
                    ph: Math.random() * Math.PI * 2
                });
            }
        }

        function drawReflections(t) {
            for (const r of reflections) {
                const s = 0.4 + 0.6 * Math.sin(t * r.spd + r.ph);
                const ox = Math.sin(t * 0.7 + r.ph) * 3;
                ctx.fillStyle = 'rgba(190,215,255,' + (r.a * s).toFixed(3) + ')';
                ctx.fillRect(r.x + ox, r.y, r.w * s, r.h);
            }
        }

        /* ====== 波浪系统 ====== */
        const waveLayers = [
            { yOff: 0,     amp: 2,  freq: 0.022, spd: 0.25, ph: 0,    r: 10, g: 18, b: 48, a: 0.75 },
            { yOff: 0.025, amp: 3,  freq: 0.016, spd: 0.35, ph: 1.3,  r: 12, g: 22, b: 56, a: 0.65 },
            { yOff: 0.05,  amp: 4,  freq: 0.012, spd: 0.45, ph: 2.5,  r: 14, g: 26, b: 65, a: 0.55 },
            { yOff: 0.09,  amp: 6,  freq: 0.009, spd: 0.55, ph: 3.7,  r: 17, g: 32, b: 74, a: 0.48 },
            { yOff: 0.14,  amp: 8,  freq: 0.007, spd: 0.68, ph: 4.9,  r: 20, g: 38, b: 84, a: 0.42 },
            { yOff: 0.20,  amp: 10, freq: 0.005, spd: 0.82, ph: 6.1,  r: 24, g: 44, b: 95, a: 0.36 },
            { yOff: 0.26,  amp: 13, freq: 0.004, spd: 1.0,  ph: 7.3,  r: 28, g: 52, b: 108,a: 0.30 },
        ];

        function waveY(x, t, layer) {
            const base = horizonY + layer.yOff * H;
            return base
                + layer.amp * Math.sin(x * layer.freq + t * layer.spd + layer.ph)
                + layer.amp * 0.45 * Math.sin(x * layer.freq * 2.2 + t * layer.spd * 1.4 + layer.ph * 1.6)
                + layer.amp * 0.22 * Math.sin(x * layer.freq * 3.5 + t * layer.spd * 0.75 + layer.ph * 2.2);
        }

        function drawWaves(t) {
            for (let li = 0; li < waveLayers.length; li++) {
                const L = waveLayers[li];
                ctx.beginPath();
                ctx.moveTo(-2, sandY + 25);
                for (let x = -2; x <= W + 2; x += 2) {
                    ctx.lineTo(x, waveY(x, t, L));
                }
                ctx.lineTo(W + 2, sandY + 25);
                ctx.closePath();
                ctx.fillStyle = 'rgba(' + L.r + ',' + L.g + ',' + L.b + ',' + L.a + ')';
                ctx.fill();

                ctx.beginPath();
                for (let x = -2; x <= W + 2; x += 2) {
                    const y = waveY(x, t, L);
                    x === -2 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                }
                ctx.strokeStyle = 'rgba(70,130,195,' + (L.a * 0.45).toFixed(3) + ')';
                ctx.lineWidth = 0.7;
                ctx.stroke();
            }
        }

        /* ====== 海浪泡沫 ====== */
        function drawFoam(t) {
            for (let x = 0; x < W; x += 3) {
                const wo = 10 * Math.sin(x * 0.009 + t * 0.75) + 4 * Math.sin(x * 0.025 + t * 1.1);
                const y = sandY - 4 + wo;
                const a = 0.12 + 0.08 * Math.sin(x * 0.04 + t * 1.3);
                const w = 7 + 4 * Math.sin(x * 0.02 + t * 0.6);
                ctx.fillStyle = 'rgba(195,215,235,' + a.toFixed(3) + ')';
                ctx.fillRect(x, y, w, 1.5);
            }
        }

        /* ====== 沙滩 ====== */
        let sandGrains = [];
        function initSandGrains() {
            sandGrains = [];
            for (let i = 0; i < 600; i++) {
                sandGrains.push({
                    x: Math.random() * W,
                    y: sandY + Math.random() * (H - sandY),
                    r: Math.random() * 1.2 + 0.3,
                    a: Math.random() * 0.12 + 0.04
                });
            }
        }

        function drawBeach() {
            const sg = ctx.createLinearGradient(0, sandY - 3, 0, H);
            sg.addColorStop(0, '#4a4030');
            sg.addColorStop(0.1, '#5e5240');
            sg.addColorStop(0.3, '#7a6d55');
            sg.addColorStop(0.6, '#9a8a68');
            sg.addColorStop(1, '#b09a74');
            ctx.fillStyle = sg;
            ctx.fillRect(0, sandY - 3, W, H - sandY + 3);

            for (const g of sandGrains) {
                ctx.fillStyle = 'rgba(175,160,125,' + g.a.toFixed(3) + ')';
                ctx.fillRect(g.x, g.y, g.r, g.r);
            }
        }

        /* ====== 贝壳绘制 ====== */
        let shells = [];
        function initShells() {
            shells = [];
            const shellCount = Math.max(12, Math.floor(W / 100));
            const types = ['fan', 'spiral', 'clam', 'cone', 'flat'];
            /* 贝壳颜色池 */
            const palettes = [
                { body: '#d4b896', edge: '#a08060', inner: '#f0e0c8' },
                { body: '#c8a882', edge: '#8a6e50', inner: '#e8d4b8' },
                { body: '#bfa070', edge: '#907048', inner: '#e0ccaa' },
                { body: '#dcc8a8', edge: '#b09878', inner: '#f5ece0' },
                { body: '#c0a078', edge: '#886848', inner: '#e8dcc4' },
                { body: '#e0c8a0', edge: '#b8a078', inner: '#f8f0e4' },
                { body: '#b89870', edge: '#806040', inner: '#ddd0b8' },
                { body: '#c8b898', edge: '#a09068', inner: '#f0e8d8' },
            ];
            for (let i = 0; i < shellCount; i++) {
                shells.push({
                    x: Math.random() * W,
                    y: sandY + 8 + Math.random() * (H - sandY - 20),
                    type: types[Math.floor(Math.random() * types.length)],
                    size: 0.5 + Math.random() * 0.9,
                    angle: (Math.random() - 0.5) * 0.8,
                    palette: palettes[Math.floor(Math.random() * palettes.length)],
                    flip: Math.random() > 0.5
                });
            }
        }

        function drawShell(s) {
            ctx.save();
            ctx.translate(s.x, s.y);
            ctx.rotate(s.angle);
            if (s.flip) ctx.scale(-1, 1);
            ctx.scale(s.size, s.size);
            const p = s.palette;

            switch (s.type) {
                case 'fan': drawFanShell(p); break;
                case 'spiral': drawSpiralShell(p); break;
                case 'clam': drawClamShell(p); break;
                case 'cone': drawConeShell(p); break;
                case 'flat': drawFlatShell(p); break;
            }
            ctx.restore();
        }

        /* 扇贝 */
        function drawFanShell(p) {
            const ribs = 9;
            /* 扇面 */
            ctx.beginPath();
            ctx.moveTo(0, 5);
            for (let i = 0; i <= ribs; i++) {
                const ang = -Math.PI * 0.85 + (Math.PI * 1.7 / ribs) * i;
                const r = 14;
                ctx.lineTo(Math.cos(ang) * r, Math.sin(ang) * r - 4);
            }
            ctx.closePath();
            const fg = ctx.createRadialGradient(0, -4, 2, 0, -4, 14);
            fg.addColorStop(0, p.inner);
            fg.addColorStop(0.6, p.body);
            fg.addColorStop(1, p.edge);
            ctx.fillStyle = fg;
            ctx.fill();
            ctx.strokeStyle = p.edge;
            ctx.lineWidth = 0.6;
            ctx.stroke();

            /* 放射纹 */
            for (let i = 1; i < ribs; i++) {
                const ang = -Math.PI * 0.85 + (Math.PI * 1.7 / ribs) * i;
                ctx.beginPath();
                ctx.moveTo(0, 5);
                ctx.lineTo(Math.cos(ang) * 12, Math.sin(ang) * 12 - 4);
                ctx.strokeStyle = 'rgba(' + hexToRgb(p.edge) + ',0.35)';
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }

            /* 同心弧纹 */
            for (let r = 5; r <= 11; r += 3) {
                ctx.beginPath();
                ctx.arc(0, -4, r, -Math.PI * 0.8, Math.PI * 0.8);
                ctx.strokeStyle = 'rgba(' + hexToRgb(p.edge) + ',0.2)';
                ctx.lineWidth = 0.4;
                ctx.stroke();
            }

            /* 底部铰合 */
            ctx.beginPath();
            ctx.ellipse(0, 5, 4, 2, 0, 0, Math.PI * 2);
            ctx.fillStyle = p.edge;
            ctx.fill();
        }

        /* 螺旋贝 */
        function drawSpiralShell(p) {
            ctx.beginPath();
            for (let a = 0; a < Math.PI * 5; a += 0.1) {
                const r = 1.5 + a * 1.1;
                const x = Math.cos(a) * r;
                const y = -Math.sin(a) * r + 4;
                a === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.strokeStyle = p.body;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.stroke();
            ctx.strokeStyle = 'rgba(' + hexToRgb(p.inner) + ',0.4)';
            ctx.lineWidth = 1.2;
            ctx.stroke();

            /* 顶端小圆 */
            ctx.beginPath();
            ctx.arc(0, 4, 2, 0, Math.PI * 2);
            ctx.fillStyle = p.edge;
            ctx.fill();
        }

        /* 蛤蜊 */
        function drawClamShell(p) {
            /* 上壳 */
            ctx.beginPath();
            ctx.ellipse(0, -2, 10, 7, 0, Math.PI, 0);
            const cg = ctx.createLinearGradient(-10, -9, 10, -2);
            cg.addColorStop(0, p.edge);
            cg.addColorStop(0.5, p.body);
            cg.addColorStop(1, p.inner);
            ctx.fillStyle = cg;
            ctx.fill();
            ctx.strokeStyle = p.edge;
            ctx.lineWidth = 0.7;
            ctx.stroke();

            /* 下壳（微张） */
            ctx.beginPath();
            ctx.ellipse(0, -1, 10, 6, 0, 0, Math.PI);
            const cg2 = ctx.createLinearGradient(-10, -1, 10, 5);
            cg2.addColorStop(0, p.body);
            cg2.addColorStop(0.5, p.inner);
            cg2.addColorStop(1, p.body);
            ctx.fillStyle = cg2;
            ctx.fill();
            ctx.strokeStyle = p.edge;
            ctx.lineWidth = 0.7;
            ctx.stroke();

            /* 放射纹 */
            for (let i = -3; i <= 3; i++) {
                ctx.beginPath();
                ctx.moveTo(i * 2.5, -2);
                ctx.lineTo(i * 3.5, -8);
                ctx.strokeStyle = 'rgba(' + hexToRgb(p.edge) + ',0.2)';
                ctx.lineWidth = 0.4;
                ctx.stroke();
            }

            /* 铰合线 */
            ctx.beginPath();
            ctx.moveTo(-10, -2);
            ctx.lineTo(10, -2);
            ctx.strokeStyle = p.edge;
            ctx.lineWidth = 0.8;
            ctx.stroke();
        }

        /* 锥形贝（海螺） */
        function drawConeShell(p) {
            /* 锥体轮廓 */
            ctx.beginPath();
            ctx.moveTo(0, 12);
            ctx.lineTo(-8, -10);
            ctx.quadraticCurveTo(0, -14, 8, -10);
            ctx.lineTo(0, 12);
            ctx.closePath();
            const cg = ctx.createLinearGradient(-8, 0, 8, 0);
            cg.addColorStop(0, p.edge);
            cg.addColorStop(0.4, p.body);
            cg.addColorStop(0.6, p.inner);
            cg.addColorStop(1, p.edge);
            ctx.fillStyle = cg;
            ctx.fill();
            ctx.strokeStyle = p.edge;
            ctx.lineWidth = 0.7;
            ctx.stroke();

            /* 横纹 */
            for (let i = 0; i < 6; i++) {
                const t = i / 5;
                const y = 12 - t * 24;
                const hw = 8 * (1 - t * 0.85);
                ctx.beginPath();
                ctx.moveTo(-hw, y);
                ctx.lineTo(hw, y);
                ctx.strokeStyle = 'rgba(' + hexToRgb(p.edge) + ',0.25)';
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }

            /* 顶端开口 */
            ctx.beginPath();
            ctx.ellipse(0, -10, 3.5, 1.8, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(' + hexToRgb(p.inner) + ',0.6)';
            ctx.fill();
            ctx.strokeStyle = p.edge;
            ctx.lineWidth = 0.5;
            ctx.stroke();
        }

        /* 扁平贝（花纹） */
        function drawFlatShell(p) {
            ctx.beginPath();
            ctx.ellipse(0, 0, 11, 7, 0, 0, Math.PI * 2);
            const fg = ctx.createRadialGradient(-2, -1, 1, 0, 0, 11);
            fg.addColorStop(0, p.inner);
            fg.addColorStop(0.5, p.body);
            fg.addColorStop(1, p.edge);
            ctx.fillStyle = fg;
            ctx.fill();
            ctx.strokeStyle = p.edge;
            ctx.lineWidth = 0.6;
            ctx.stroke();

            /* 花纹斑点 */
            const spots = [
                [-4, -2, 1.8], [3, -1.5, 1.5], [-1, 2.5, 1.3],
                [5, 1, 1.2], [-6, 0.5, 1], [1, -3.5, 1.1], [-2.5, 3.5, 0.9]
            ];
            for (const sp of spots) {
                ctx.beginPath();
                ctx.arc(sp[0], sp[1], sp[2], 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(' + hexToRgb(p.edge) + ',0.3)';
                ctx.fill();
            }

            /* 中线 */
            ctx.beginPath();
            ctx.moveTo(-10, 0);
            ctx.lineTo(10, 0);
            ctx.strokeStyle = 'rgba(' + hexToRgb(p.edge) + ',0.15)';
            ctx.lineWidth = 0.4;
            ctx.stroke();
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return r + ',' + g + ',' + b;
        }

        function drawShells() {
            for (const s of shells) drawShell(s);
        }

        /* ====== 螃蟹绘制与动画 ====== */
        let crabs = [];
        function initCrabs() {
            crabs = [
                {
                    x: W * 0.25,
                    baseY: sandY + (H - sandY) * 0.35,
                    dir: 1,
                    speed: 0.35,
                    walkPhase: 0,
                    pauseTimer: 0,
                    pausing: false,
                    clawPhase: 0,
                    size: 1,
                    color: { body: '#8b4513', shell: '#a0522d', leg: '#6b3410', claw: '#b5651d', eye: '#1a0a00' }
                },
                {
                    x: W * 0.72,
                    baseY: sandY + (H - sandY) * 0.55,
                    dir: -1,
                    speed: 0.28,
                    walkPhase: Math.PI,
                    pauseTimer: 2,
                    pausing: true,
                    clawPhase: Math.PI * 0.5,
                    size: 0.75,
                    color: { body: '#6b3a1f', shell: '#7a4428', leg: '#52290f', claw: '#8b5a2b', eye: '#100500' }
                },
                {
                    x: W * 0.5,
                    baseY: sandY + (H - sandY) * 0.75,
                    dir: 1,
                    speed: 0.42,
                    walkPhase: Math.PI * 1.5,
                    pauseTimer: 0,
                    pausing: false,
                    clawPhase: Math.PI,
                    size: 0.6,
                    color: { body: '#9c5a30', shell: '#b06838', leg: '#7a4420', claw: '#c07840', eye: '#1a0a00' }
                }
            ];
        }

        function updateCrabs(t, dt) {
            for (const c of crabs) {
                if (c.pausing) {
                    c.pauseTimer -= dt;
                    if (c.pauseTimer <= 0) {
                        c.pausing = false;
                        c.dir *= (Math.random() > 0.5 ? 1 : -1);
                    }
                    /* 暂停时钳子缓慢开合 */
                    c.clawPhase += dt * 1.5;
                } else {
                    c.x += c.dir * c.speed * 60 * dt;
                    c.walkPhase += c.speed * 8 * dt;
                    c.clawPhase += dt * 3;

                    /* 超出范围则暂停并转向 */
                    if (c.x < W * 0.05 || c.x > W * 0.95) {
                        c.pausing = true;
                        c.pauseTimer = 1.5 + Math.random() * 2;
                        c.dir *= -1;
                    }

                    /* 随机暂停 */
                    if (Math.random() < 0.001) {
                        c.pausing = true;
                        c.pauseTimer = 2 + Math.random() * 3;
                    }
                }
            }
        }

        function drawCrab(c, t) {
            ctx.save();
            ctx.translate(c.x, c.baseY);
            ctx.scale(c.dir * c.size, c.size);

            const col = c.color;
            const walkAnim = c.pausing ? 0 : Math.sin(c.walkPhase) * 0.3;
            const clawOpen = 0.3 + 0.25 * Math.sin(c.clawPhase);

            /* 腿（3对） */
            ctx.strokeStyle = col.leg;
            ctx.lineWidth = 1.3;
            ctx.lineCap = 'round';
            for (let side = -1; side <= 1; side += 2) {
                for (let i = 0; i < 3; i++) {
                    const phaseOff = i * Math.PI * 0.7 + (side > 0 ? Math.PI : 0);
                    const swing = c.pausing ? 0 : Math.sin(c.walkPhase + phaseOff) * 0.2;
                    const baseX = side * 6;
                    const baseY = 1 + i * 2.5;
                    const midX = baseX + side * 7;
                    const midY = baseY + 5 + swing * 5;
                    const tipX = midX + side * 6;
                    const tipY = midY + 3 + Math.abs(swing) * 3;

                    ctx.beginPath();
                    ctx.moveTo(baseX, baseY);
                    ctx.quadraticCurveTo(midX, midY - 2, midX, midY);
                    ctx.quadraticCurveTo(midX + side * 1, midY + 2, tipX, tipY);
                    ctx.stroke();
                }
            }

            /* 身体阴影 */
            ctx.beginPath();
            ctx.ellipse(1, 2, 10, 7, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.fill();

            /* 身体（椭圆形壳） */
            ctx.beginPath();
            ctx.ellipse(0, 0, 10, 7, 0, 0, Math.PI * 2);
            const bodyG = ctx.createRadialGradient(-2, -2, 1, 0, 0, 10);
            bodyG.addColorStop(0, col.shell);
            bodyG.addColorStop(0.7, col.body);
            bodyG.addColorStop(1, col.leg);
            ctx.fillStyle = bodyG;
            ctx.fill();
            ctx.strokeStyle = col.leg;
            ctx.lineWidth = 0.8;
            ctx.stroke();

            /* 壳上花纹 */
            ctx.beginPath();
            ctx.ellipse(-1, -1, 5, 3.5, -0.2, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(' + hexToRgb(col.shell) + ',0.5)';
            ctx.lineWidth = 0.5;
            ctx.stroke();

            /* 小凸点 */
            const bumps = [[-3, -2], [0, -3], [3, -1.5], [-1, 1], [2, 1.5], [-4, 0.5]];
            for (const b of bumps) {
                ctx.beginPath();
                ctx.arc(b[0], b[1], 0.7, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(' + hexToRgb(col.shell) + ',0.6)';
                ctx.fill();
            }

            /* 钳子（左） */
            drawClaw(-10, -2, clawOpen, col, -1);
            /* 钳子（右） */
            drawClaw(10, -2, clawOpen, col, 1);

            /* 眼柄 */
            ctx.strokeStyle = col.leg;
            ctx.lineWidth = 1;
            ctx.lineCap = 'round';
            /* 左眼 */
            ctx.beginPath();
            ctx.moveTo(-3, -6);
            ctx.quadraticCurveTo(-4, -11, -3.5, -12);
            ctx.stroke();
            /* 右眼 */
            ctx.beginPath();
            ctx.moveTo(3, -6);
            ctx.quadraticCurveTo(4, -11, 3.5, -12);
            ctx.stroke();

            /* 眼珠 */
            ctx.beginPath();
            ctx.arc(-3.5, -12, 1.5, 0, Math.PI * 2);
            ctx.fillStyle = col.eye;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(-3.5, -12, 0.5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(3.5, -12, 1.5, 0, Math.PI * 2);
            ctx.fillStyle = col.eye;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(3.5, -12, 0.5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.fill();

            ctx.restore();
        }

        function drawClaw(ox, oy, open, col, side) {
            ctx.save();
            ctx.translate(ox, oy);

            /* 臂 */
            ctx.strokeStyle = col.leg;
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(side * 6, -3);
            ctx.stroke();

            /* 钳子 */
            ctx.translate(side * 6, -3);
            const openAngle = open * 0.5;

            /* 上钳 */
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(side * 4, -4 - open * 4, side * 7, -2 - open * 3);
            ctx.strokeStyle = col.claw;
            ctx.lineWidth = 2.5;
            ctx.stroke();

            /* 下钳 */
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(side * 4, 2 + open * 3, side * 7, 1 + open * 2);
            ctx.stroke();

            /* 钳尖 */
            ctx.beginPath();
            ctx.arc(side * 7, -2 - open * 3, 1, 0, Math.PI * 2);
            ctx.fillStyle = col.claw;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(side * 7, 1 + open * 2, 1, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function drawCrabs(t, dt) {
            updateCrabs(t, dt);
            for (const c of crabs) drawCrab(c, t);
        }

        /* ====== 漂流瓶绘制 ====== */
        function drawBottle(cx, cy, scale, angle, glow) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle);
            ctx.scale(scale, scale);

            if (glow) {
                const rg = ctx.createRadialGradient(0, -12, 2, 0, -12, 30);
                rg.addColorStop(0, 'rgba(100,180,240,0.12)');
                rg.addColorStop(1, 'rgba(100,180,240,0)');
                ctx.fillStyle = rg;
                ctx.beginPath();
                ctx.arc(0, -12, 30, 0, Math.PI * 2);
                ctx.fill();
            }

            const bw = 16, bh = 28, nw = 6, nh = 9;

            ctx.beginPath();
            ctx.moveTo(-bw / 2, 0);
            ctx.quadraticCurveTo(-bw / 2, bh * 0.38, 0, bh * 0.38);
            ctx.quadraticCurveTo(bw / 2, bh * 0.38, bw / 2, 0);
            ctx.lineTo(bw / 2, -bh);
            ctx.quadraticCurveTo(bw / 2, -bh - 5, nw / 2, -bh - 5);
            ctx.lineTo(nw / 2, -bh - 5 - nh);
            ctx.lineTo(-nw / 2, -bh - 5 - nh);
            ctx.lineTo(-nw / 2, -bh - 5);
            ctx.quadraticCurveTo(-bw / 2, -bh - 5, -bw / 2, -bh);
            ctx.closePath();

            const gg = ctx.createLinearGradient(-bw / 2, 0, bw / 2, 0);
            gg.addColorStop(0, 'rgba(95,165,210,0.18)');
            gg.addColorStop(0.3, 'rgba(165,215,240,0.32)');
            gg.addColorStop(0.7, 'rgba(130,195,225,0.26)');
            gg.addColorStop(1, 'rgba(85,155,200,0.18)');
            ctx.fillStyle = gg;
            ctx.fill();
            ctx.strokeStyle = 'rgba(175,218,240,0.4)';
            ctx.lineWidth = 0.7;
            ctx.stroke();

            ctx.beginPath();
            ctx.ellipse(0, -bh * 0.3, 3.5, 10, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(240,228,195,0.5)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(200,188,155,0.25)';
            ctx.lineWidth = 0.4;
            ctx.stroke();

            ctx.fillStyle = '#8a7350';
            fillRoundRect(-nw / 2 + 0.5, -bh - 5 - nh - 3.5, nw - 1, 4.5, 1);

            ctx.fillStyle = 'rgba(255,255,255,0.18)';
            ctx.fillRect(-bw / 2 + 2.5, -bh + 3, 2.2, bh - 7);
            ctx.fillStyle = 'rgba(255,255,255,0.12)';
            ctx.fillRect(-nw / 2 + 1, -bh - 5 - nh, nw - 2, nh);

            ctx.restore();
        }

        const waterBottles = [
            { xR: 0.14, li: 2 },
            { xR: 0.36, li: 3 },
            { xR: 0.56, li: 1 },
            { xR: 0.76, li: 4 },
            { xR: 0.92, li: 3 },
        ];

        const sandBottles = [
            { xR: 0.10, yR: 0.79, ang: -0.12, sc: 1.05 },
            { xR: 0.42, yR: 0.83, ang: 0.18, sc: 0.9 },
            { xR: 0.68, yR: 0.77, ang: -0.22, sc: 1.1 },
            { xR: 0.87, yR: 0.85, ang: 0.08, sc: 0.85 },
        ];

        function drawWaterBottles(t) {
            for (const b of waterBottles) {
                const x = b.xR * W;
                const L = waveLayers[b.li];
                const y = waveY(x, t, L);
                const ang = Math.sin(t * 0.7 + b.xR * 12) * 0.1;
                const sc = 1 + Math.sin(t * 1.1 + b.xR * 6) * 0.025;
                drawBottle(x, y - 2, sc, ang, true);
            }
        }

        function drawSandBottles() {
            for (const b of sandBottles) {
                drawBottle(b.xR * W, b.yR * H, b.sc, b.ang, false);
            }
        }

        /* ====== 地平线光晕 ====== */
        function drawHorizonGlow() {
            const rg = ctx.createRadialGradient(W / 2, horizonY, 0, W / 2, horizonY, W * 0.55);
            rg.addColorStop(0, 'rgba(25,45,80,0.25)');
            rg.addColorStop(0.4, 'rgba(18,32,60,0.12)');
            rg.addColorStop(1, 'rgba(10,18,38,0)');
            ctx.fillStyle = rg;
            ctx.fillRect(0, horizonY - H * 0.08, W, H * 0.16);
        }

        /* ====== 主渲染循环 ====== */
        let lastTs = 0;
        function render(ts) {
            const dt = Math.min((ts - lastTs) / 1000, 0.05);
            lastTs = ts;
            const t = ts / 1000;
            ctx.clearRect(0, 0, W, H);

            /* 天空 */
            const skyG = ctx.createLinearGradient(0, 0, 0, horizonY + 5);
            skyG.addColorStop(0, '#000510');
            skyG.addColorStop(0.35, '#060d24');
            skyG.addColorStop(0.65, '#0a1535');
            skyG.addColorStop(1, '#0e1c42');
            ctx.fillStyle = skyG;
            ctx.fillRect(0, 0, W, horizonY + 5);

            drawMilkyWay(t);
            drawStars(t);
            updateMeteors(t);
            drawHorizonGlow();

            /* 海面 */
            const seaG = ctx.createLinearGradient(0, horizonY, 0, sandY);
            seaG.addColorStop(0, '#070c22');
            seaG.addColorStop(0.35, '#0a1338');
            seaG.addColorStop(0.7, '#0d1848');
            seaG.addColorStop(1, '#101e58');
            ctx.fillStyle = seaG;
            ctx.fillRect(0, horizonY - 3, W, sandY - horizonY + 8);

            drawWaves(t);
            drawReflections(t);
            drawWaterBottles(t);
            drawFoam(t);

            /* 沙滩 */
            drawBeach();
            drawShells();
            drawSandBottles();
            drawCrabs(t, dt);

            requestAnimationFrame(render);
        }

        /* ====== 初始化 ====== */
        function init() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            horizonY = H * 0.44;
            sandY = H * 0.71;
            initStars();
            initMilkyWay();
            initReflections();
            initSandGrains();
            initShells();
            initCrabs();
        }

        window.addEventListener('resize', init);
        init();
        requestAnimationFrame(render);
    })();
    </script>
</body>
</html>
